<header class="sticky top-0 z-50 w-full border-b border-slate-700 bg-slate-900/90 backdrop-blur-xl px-4 sm:px-6 py-4">
    <div class="mx-auto flex max-w-[100rem] items-center justify-between">
        
        <!-- Tactical Logo -->
        <a href="/" class="group flex items-center gap-3">
            <!-- HT Polygon block from footer -->
            <div class="flex h-10 w-10 items-center justify-center bg-red-600 text-white transition-transform group-hover:scale-105" style="clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);">
                <span class="font-black text-lg tracking-tighter">HT</span>
            </div>
            <div class="flex flex-col">
                <span class="text-xl font-black tracking-tighter text-white uppercase leading-none mt-1 group-hover:text-amber-400 transition-colors">Heet Media</span>
                <span class="text-[0.6rem] font-bold text-red-500 tracking-[0.3em] uppercase leading-none mt-1">Global Intel</span>
            </div>
        </a>

        <!-- Navigation Desktop -->
        <nav class="hidden md:flex items-center gap-8">
            <a href="/" class="group flex items-center gap-2 text-xs font-black uppercase tracking-widest text-slate-300 transition-all duration-300 hover:text-white">
                <span class="w-1.5 h-1.5 bg-slate-700 block group-hover:bg-amber-400 transition-colors"></span>
                Terminal
            </a>
            <a href="/tags/esports" class="group flex items-center gap-2 text-xs font-black uppercase tracking-widest text-slate-300 transition-all duration-300 hover:text-white">
                <span class="w-1.5 h-1.5 bg-slate-700 block group-hover:bg-amber-400 transition-colors"></span>
                Esports
            </a>
            <a href="/tags/hardware" class="group flex items-center gap-2 text-xs font-black uppercase tracking-widest text-slate-300 transition-all duration-300 hover:text-white">
                <span class="w-1.5 h-1.5 bg-slate-700 block group-hover:bg-amber-400 transition-colors"></span>
                Hardware
            </a>
            <a href="/about" class="group flex items-center gap-2 text-xs font-black uppercase tracking-widest text-slate-300 transition-all duration-300 hover:text-white">
                <span class="w-1.5 h-1.5 bg-slate-700 block group-hover:bg-amber-400 transition-colors"></span>
                Database
            </a>
            
            <!-- Quick Action button -->
            <a href="/contact" class="ml-4 inline-flex items-center justify-center bg-slate-800 border border-slate-700 px-5 py-2.5 text-[0.65rem] font-black uppercase tracking-[0.2em] text-amber-500 hover:bg-red-600 hover:text-white hover:border-red-600 transition-all focus:outline-none" style="clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);">
                Secure Comms
            </a>
        </nav>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn"
            class="md:hidden flex items-center justify-center w-10 h-10 text-slate-400 bg-slate-800 hover:bg-slate-700 hover:text-amber-400 focus:outline-none transition-colors border border-slate-700"
            aria-label="Toggle menu" style="clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path id="menu-icon-bars" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16" />
                <path id="menu-icon-close" class="hidden" stroke-linecap="round" stroke-linejoin="round"
                    stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <!-- Mobile Navigation Grid -->
    <div id="mobile-menu"
        class="hidden md:hidden mt-4 bg-slate-900 border border-slate-800 p-4 shadow-2xl relative" style="clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);">
        
        <div class="absolute inset-0 opacity-10 bg-[linear-gradient(rgba(255,255,255,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.1)_1px,transparent_1px)] bg-[size:10px_10px] pointer-events-none"></div>

        <div class="flex flex-col gap-1 relative z-10">
            <a href="/"
                class="group flex items-center gap-3 text-sm font-black tracking-widest uppercase text-slate-300 hover:text-white px-4 py-3 bg-slate-800/50 hover:bg-slate-800 transition-all border-l-2 border-transparent hover:border-red-600">
                <span class="w-1.5 h-1.5 bg-slate-600 block group-hover:bg-amber-400 transition-colors"></span> Primary Node (Home)
            </a>
            <a href="/tags/esports"
                class="group flex items-center gap-3 text-sm font-black tracking-widest uppercase text-slate-300 hover:text-white px-4 py-3 bg-slate-800/50 hover:bg-slate-800 transition-all border-l-2 border-transparent hover:border-red-600">
                <span class="w-1.5 h-1.5 bg-slate-600 block group-hover:bg-amber-400 transition-colors"></span> Esports
            </a>
            <a href="/tags/hardware"
                class="group flex items-center gap-3 text-sm font-black tracking-widest uppercase text-slate-300 hover:text-white px-4 py-3 bg-slate-800/50 hover:bg-slate-800 transition-all border-l-2 border-transparent hover:border-red-600">
                <span class="w-1.5 h-1.5 bg-slate-600 block group-hover:bg-amber-400 transition-colors"></span> Hardware
            </a>
            <a href="/about"
                class="group flex items-center gap-3 text-sm font-black tracking-widest uppercase text-slate-300 hover:text-white px-4 py-3 bg-slate-800/50 hover:bg-slate-800 transition-all border-l-2 border-transparent hover:border-red-600 mb-4">
                <span class="w-1.5 h-1.5 bg-slate-600 block group-hover:bg-amber-400 transition-colors"></span> Intel Database (About)
            </a>
            
            <a href="/contact" class="w-full text-center bg-red-600 hover:bg-red-500 text-white font-black uppercase tracking-[0.2em] px-4 py-3 transition-colors focus:outline-none" style="clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);">
                Establish Secure Comms
            </a>
        </div>
    </div>
</header>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        const iconBars = document.getElementById('menu-icon-bars');
        const iconClose = document.getElementById('menu-icon-close');

        btn.addEventListener('click', function () {
            menu.classList.toggle('hidden');
            iconBars.classList.toggle('hidden');
            iconClose.classList.toggle('hidden');
        });
    });
</script>
