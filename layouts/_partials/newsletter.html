<!-- High Energy Newsletter CTA -->
<div class="w-full bg-slate-950 border-y border-slate-800 relative overflow-hidden py-20 lg:py-32">

    <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">

        <div class="inline-flex items-center gap-3 mb-6">

        <!-- Big Header Block -->
        <h2 class="text-4xl md:text-5xl lg:text-6xl font-black uppercase text-white tracking-tighter mb-6 drop-shadow-lg">
            Join the <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-red-600">Network</span>
        </h2>

        <form action="#" method="POST" class="flex flex-col sm:flex-row items-center justify-center gap-4 max-w-2xl mx-auto">

        <p class="text-[0.6rem] text-slate-600 mt-6 tracking-widest uppercase font-mono border-b border-slate-800 pb-1 inline-block">No spam. Disconnect protocol available at all times.</p>
