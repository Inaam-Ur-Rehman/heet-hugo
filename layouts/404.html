{{ define "main" }}
<div class="relative flex min-h-[calc(100vh-80px)] items-center justify-center overflow-hidden selection:bg-amber-400 selection:text-slate-900">
    <!-- Abstract Background Gradients -->
    <div class="absolute -top-40 -right-40 h-[500px] w-[500px] rounded-full bg-red-900/30 mix-blend-screen blur-3xl opacity-70 animate-pulse"></div>
    <div class="absolute -bottom-40 -left-40 h-[500px] w-[500px] rounded-full bg-amber-900/20 mix-blend-screen blur-3xl opacity-70 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="relative z-10 w-full max-w-2xl px-6 text-center">
        <!-- Error Code -->
        <h1 class="relative inline-block text-[12rem] font-extrabold tracking-tighter leading-none text-transparent md:text-[15rem]">
            <span class="bg-gradient-to-br from-red-800 via-red-600 to-red-500 bg-clip-text text-transparent drop-shadow-sm">4</span>
            <span class="bg-gradient-to-br from-amber-500 via-amber-400 to-yellow-300 bg-clip-text text-transparent drop-shadow-sm">0</span>
            <span class="bg-gradient-to-br from-red-800 via-red-600 to-red-500 bg-clip-text text-transparent drop-shadow-sm">4</span>
            
            <!-- Subtle decorative dot -->
            <div class="absolute bottom-12 right-0 h-4 w-4 md:bottom-16 rounded-full bg-amber-400 shadow-[0_0_15px_rgba(251,191,36,0.3)]"></div>
        </h1>

        <!-- Content -->
        <div class="mt-8 flex flex-col items-center">
            <h2 class="text-3xl font-bold tracking-tight text-white md:text-4xl">Page not found</h2>
            <p class="mx-auto mt-4 max-w-md text-base leading-relaxed text-slate-400">
                Sorry, but the page you are looking for has been moved, deleted, or possibly never existed. Let's get you back on track.
            </p>

            <!-- Action Buttons -->
            <div class="mt-10 flex flex-col sm:flex-row items-center gap-4">
                <a href="/" class="group relative inline-flex items-center justify-center gap-2 overflow-hidden rounded-xl bg-red-600 px-8 py-3.5 text-sm font-semibold text-white shadow-lg shadow-red-600/30 transition-all duration-300 hover:-translate-y-0.5 hover:bg-red-700 hover:shadow-xl hover:shadow-red-600/40 focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 focus:ring-offset-slate-900">
                    <span class="relative z-10 flex items-center gap-2">
                        <svg class="h-4 w-4 transition-transform duration-300 group-hover:-translate-x-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                        </svg>
                        Back to Homepage
                    </span>
                    <div class="absolute inset-0 z-0 h-full w-full bg-gradient-to-r from-transparent via-amber-300/30 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                </a>
                
                <a href="/contact" class="inline-flex items-center justify-center px-8 py-3.5 text-sm font-semibold text-slate-300 transition-all duration-300 hover:text-amber-400 hover:underline underline-offset-4 focus:outline-none">
                    Report a problem
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes shimmer {
        100% {
            transform: translateX(100%);
        }
    }
</style>
{{ end }}
