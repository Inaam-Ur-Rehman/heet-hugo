{{ $type := .Get "type" | default "track" }}
{{ $id := .Get "id" }}

<div class="my-8 relative group max-w-[600px]">
    <!-- Container -->
    <div class="relative bg-slate-950 border border-slate-800 p-2 shadow-2xl transition-colors hover:border-[#1DB954]/50"
        style="clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);">
        
        <!-- Glow line on hover -->
        <div class="absolute left-0 top-0 w-[4px] h-full bg-slate-800 group-hover:bg-[#1DB954] transition-colors shadow-[0_0_15px_#1DB954] opacity-0 group-hover:opacity-100"></div>
        <div class="absolute left-0 top-0 w-[4px] h-full bg-slate-800 group-hover:bg-transparent transition-colors"></div>

        <!-- Header -->
        <div class="flex items-center gap-2 pl-3 pt-2 pb-2">
            <svg class="w-3.5 h-3.5 text-[#1DB954] animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.54.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15.001 10.68 18.72 12.96c.36.181.54.78.241 1.08zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
            </svg>
            <span class="text-[0.65rem] text-slate-500 uppercase tracking-widest font-mono group-hover:text-slate-300 transition-colors">Audio Feed / Synced</span>
            {{ with .Get "caption" }}
            <span class="text-[0.65rem] text-slate-600 font-mono ml-auto pr-4">// {{ . }}</span>
            {{ end }}
        </div>

        <div class="bg-black relative px-1 py-1" style="clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);">
            <!-- Spotify iframe -->
            <iframe style="border-radius:0px" src="https://open.spotify.com/embed/{{ $type }}/{{ $id }}?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" class="grayscale-[50%] group-hover:grayscale-0 transition-all duration-500"></iframe>
        </div>
    </div>
</div>
