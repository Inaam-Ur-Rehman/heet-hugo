<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>

    <!-- Injection: Premium Outfit Font via Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body
    class="bg-slate-900 text-slate-100 selection:bg-amber-400 selection:text-slate-900 font-sans antialiased flex flex-col min-h-screen">
    <!-- Main Framework -->
    {{ partial "navbar" . }}

    <div class="flex-grow">
        {{ block "main" . }}{{ end }}
    </div>

    <!-- Global Appended Blocks -->
    {{ partial "newsletter" . }}
    {{ partial "footer" . }}
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3CML751JJP"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-3CML751JJP');
    </script>
</body>

</html>
